query getProjects(
    $ids: [ID!]
    $updatedAfter: Time
    $updatedBefore: Time
    $endCursor: String
    # updatedAt only available since 17.x
    $_updatedAt: Boolean = true
) {
    projects(ids: $ids, after: $endCursor) {
        nodes {
            ...ProjectReferenceFields
            namespace {
                ...NamespaceReferenceFields
            }

            ...ProjectFieldsCore
            updatedAt @include(if: $_updatedAt)
            
            pipelines(
                scope: FINISHED
                updatedAfter: $updatedAfter
                updatedBefore: $updatedBefore
            ) {
                count
            }
            mergeRequests(
                updatedAfter: $updatedAfter
                updatedBefore: $updatedBefore
            ) {
                count
            }
        }
        pageInfo {
            ...pageFields
        }
    }
}
